<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 130" fill="none">
  <!-- Triangle play-button outline -->
  <polygon points="12,12 12,118 96,65" stroke="black" stroke-width="8" fill="none" stroke-linejoin="miter"/>
  <!-- SKY -->
  <text x="114" y="104" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-size="86" font-weight="700" letter-spacing="-1" fill="black">SKY</text>
  <!-- LINE (heavier/wider visual weight via slightly larger size) -->
  <text x="298" y="104" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-size="90" font-weight="900" letter-spacing="2" fill="black">LINE</text>
  <!-- ® -->
  <text x="488" y="42" font-family="Arial,sans-serif" font-size="30" font-weight="400" fill="black">®</text>
</svg>
